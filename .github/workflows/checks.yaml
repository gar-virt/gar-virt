name: Checks
on:
  push:
  pull_request:
    branches: [master]
jobs:
  alpine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build
        run: >
          docker build
          --tag gar-virt:alpine
          --target test
          --file "docker/alpine/Dockerfile" .
  ubuntu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [ubuntu-26.04, ubuntu-24.04]
        compiler: [clang, gcc]
        build_type: [ASan, TSan]
        include:
          - image: ubuntu-26.04
            gcc_version: 15
            clang_version: 22
          - image: ubuntu-24.04
            gcc_version: 14
            clang_version: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build
        run: >
          docker build
          --tag gar-virt:ubuntu
          --target test
          --file "docker/ubuntu/Dockerfile" .
          --build-arg "BASE_IMAGE=ghcr.io/gar-virt/runner-images:${{ matrix.image }}"
          --build-arg COMPILER=${{ matrix.compiler }}
          --build-arg BUILD_TYPE=${{ matrix.build_type }}
          --build-arg GCC_VERSION=${{ matrix.gcc_version }}
          --build-arg CLANG_VERSION=${{ matrix.clang_version }}
